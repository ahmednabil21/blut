# إعداد nginx المحسّن شركة انجاز عراق
# يجب نسخ هذا الملف إلى /etc/nginx/sites-available/wakeel

server {
    listen 80;
    server_name 94.231.205.158;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 1. API Backend (يجب أن يكون أول location)
    location /api/ {
        proxy_pass http://localhost:5000/api/;  # أو البورت الذي يعمل عليه الباكند
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Swagger (إذا كان موجود)
    location /swagger/ {
        proxy_pass http://localhost:5000/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. ملفات Static للتطبيق الرئيسي
    location /static/ {
        alias /var/www/wakeel/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 4. واجهة المشترك (subscriber-info)
    location ^~ /subscriber-info {
        alias /var/www/wakeel/app;
        index index.html;
        try_files $uri $uri/ /subscriber-info/index.html;
    }

    # 5. لوحة التحكم و login و admin (كل مسارات React Router)
    location ^~ /dashboard {
        alias /var/www/wakeel/app;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location ^~ /login {
        alias /var/www/wakeel/app;
        index index.html;
        try_files $uri $uri/ /login/index.html;
    }

    location ^~ /admin {
        alias /var/www/wakeel/app;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 6. مسار الجذر و جميع المسارات الأخرى - يجب أن يكون التطبيق الرئيسي
    location / {
        alias /var/www/wakeel/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

