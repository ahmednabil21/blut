# إعداد nginx مبسط لنظام الوكيل
# يجب نسخ هذا الملف إلى /etc/nginx/sites-available/wakeel

server {
    listen 80;
    server_name 94.231.205.158;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 1. API Backend - يجب أن يكون أول location
    location /api/ {
        proxy_pass http://localhost:5000/api/;  # تغيير البورت حسب الباكند
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Swagger (إذا كان موجود)
    location /swagger/ {
        proxy_pass http://localhost:5000/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. ملفات Static - يجب أن يكون قبل location /
    location /static/ {
        alias /var/www/wakeel/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 4. واجهة المشترك (subscriber-info) - مسار خاص
    location ^~ /subscriber-info {
        alias /var/www/wakeel/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 5. التطبيق الرئيسي - يتعامل مع جميع المسارات (/, /login, /dashboard, /admin, etc.)
    location / {
        root /var/www/wakeel/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 6. الواجهة التعريفية (Landing) - فقط إذا كان الملف غير موجود في app
    # يمكن إزالة هذا إذا كنت تريد التطبيق الرئيسي في الجذر
    # location = / {
    #     root /var/www/wakeel/landing;
    #     index index.html;
    # }
}

